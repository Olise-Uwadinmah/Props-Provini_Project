<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provini POS - Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small internal styles for the admin layout */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .admin-card { background: #252525; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .admin-form input { display: block; width: 100%; margin-bottom: 10px; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; }
        .low-stock { color: #ff4b2b; font-weight: bold; }
        .admin-link { color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="admin-link">← Back to Cashier Terminal</a>
        
        <header>
            <h1>📊 Manager Dashboard</h1>
            <p>Inventory Control & Product Management</p>
        </header>

        <main>
            <div class="admin-grid">
                <section class="admin-card">
                    <h3>✨ Add New Product</h3>
                    <div class="admin-form">
                        <input type="text" id="new-name" placeholder="Product Name (e.g. Peak Milk)">
                        <input type="text" id="new-barcode" placeholder="Barcode / Unique ID">
                        <input type="number" id="new-price" placeholder="Selling Price (₦)">
                        <input type="number" id="new-stock" placeholder="Initial Stock Quantity">
                        <button id="add-product-btn" class="primary-btn" style="width: 100%;">Create Product</button>
                    </div>
                </section>

                <section class="admin-card" style="border-left-color: var(--success);">
                    <h3>📦 Restock & Price Update</h3>
                    <div class="admin-form">
                        <input type="number" id="stock-id" placeholder="Enter Product ID" tabindex="1">
                        <input type="number" id="stock-qty" placeholder="Quantity to Add" tabindex="2">
                        <input type="number" id="stock-price" placeholder="New Price (Leave blank to keep old)" tabindex="3">
                        <button id="restock-btn" class="primary-btn" style="width: 100%; background: var(--success);" tabindex="4">Update Product (Enter)</button>
                    </div>
                </section>
            </div>

            <section class="inventory-section">
                <h2>Current Inventory Status</h2>
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Barcode</th>
                            <th>Price</th>
                            <th>Stock Level</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
