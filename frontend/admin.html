<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provini POS - Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .admin-card { background: #252525; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .admin-form input, .admin-form select { display: block; width: 100%; margin-bottom: 10px; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; }
        .low-stock { color: #ff4b2b; font-weight: bold; }
        .admin-link { color: var(--accent); text-decoration: none; margin-bottom: 20px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="admin-link">← Back to Cashier Terminal</a>
        <header>
            <h1>📊 Manager Dashboard</h1>
            <p>Inventory Control & Product Management</p>
        </header>

        <main>
            <div class="admin-grid">
                <section class="admin-card">
                    <h3>✨ Add New Product</h3>
                    <div class="admin-form">
                        <input type="text" id="new-name" placeholder="Product Name">
                        <input type="text" id="new-barcode" placeholder="Barcode">
                        <select id="new-category">
                            <option value="General">General (7.5% VAT)</option>
                            <option value="Food">Food (Exempt)</option>
                            <option value="Baby">Baby (Exempt)</option>
                            <option value="Medical">Medical (Exempt)</option>
                        </select>
                        <input type="number" id="new-price" placeholder="Price (₦)">
                        <input type="number" id="new-stock" placeholder="Initial Stock">
                        <button id="add-product-btn" class="primary-btn" style="width: 100%;">Create Product</button>
                    </div>
                </section>

                <section class="admin-card" style="border-left-color: #28a745;">
                    <h3>📦 Update Existing Item</h3>
                    <div class="admin-form">
                        <input type="number" id="stock-id" placeholder="Enter Product ID to Edit">
                        <input type="text" id="stock-name" placeholder="New Name (Leave blank to keep)">
                        <select id="stock-category">
                            <option value="">-- Change Category --</option>
                            <option value="General">General (7.5%)</option>
                            <option value="Food">Food (Exempt)</option>
                            <option value="Baby">Baby (Exempt)</option>
                            <option value="Medical">Medical (Exempt)</option>
                        </select>
                        <input type="number" id="stock-qty" placeholder="Add Stock Quantity">
                        <input type="number" id="stock-price" placeholder="New Price (₦)">
                        <button id="master-update-btn" class="primary-btn" style="width: 100%; background: #28a745;">Save All Changes</button>
                    </div>
                </section>
            </div>

            <section class="inventory-section">
                <h2>Current Inventory Status</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Barcode</th>
                            <th>Price</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
