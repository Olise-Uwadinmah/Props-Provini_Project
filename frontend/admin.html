<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Provini POS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .low-stock {
            color: #ff1744;
            font-weight: bold;
            background: rgba(255, 23, 68, 0.1);
            padding: 5px;
            border-radius: 4px;
        }

        .nav-header {
            background: #111;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>

<body>
    <div class="nav-header">
        <span>Logged in as: <strong>Admin</strong></span>
        <a href="index.html" style="color: var(--accent); text-decoration: none;">← Back to Cashier View</a>
    </div>

    <div class="container" style="margin-top: 20px;">
        <header>
            <h1>📦 Inventory Management</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Currency</small>
                <h3>Naira (₦)</h3>
            </div>
            <div class="stat-card">
                <small>Tax Rate</small>
                <h3>7.5% VAT</h3>
            </div>
        </div>

        <section class="admin-section"
            style="background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <h3>Update Product Info</h3>
            <div class="search-section">
                <input type="number" id="stock-id" placeholder="ID (Tab to move)">
                <input type="number" id="stock-qty" placeholder="Add Qty">
                <input type="number" id="stock-price" placeholder="New Price (₦)">
                <button id="restock-btn" style="background: var(--success); color: white;">Update (Enter)</button>
            </div>
        </section>
        <section class="inventory-list">
            <h3>Current Stock Overview</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Barcode</th>
                        <th>Price</th>
                        <th>In Stock</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                </tbody>
            </table>
        </section>
    </div>

    <script src="admin.js"></script>
</body>

</html>
